<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nexora AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#0F1117;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */

.bg-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  z-index:-1;
}

.orb1{
  width:300px;
  height:300px;
  background:#7B61FF;
  top:-100px;
  left:-100px;
}

.orb2{
  width:250px;
  height:250px;
  background:#00C2FF;
  bottom:-80px;
  right:-80px;
}

/* NAVBAR */

.navbar{
  width:100%;
  padding:20px 7%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:999;
  backdrop-filter:blur(20px);
  background:rgba(15,17,23,0.7);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.logo{
  font-size:24px;
  font-weight:700;
}

.nav-btn{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#7B61FF,#00C2FF);
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* HERO */

.hero{
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
}

.hero-content{
  max-width:900px;
}

.badge{
  display:inline-block;
  padding:10px 18px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:24px;
  color:#d9d9d9;
}

.hero h1{
  font-size:68px;
  line-height:1.1;
  margin-bottom:24px;
}

.gradient{
  background:linear-gradient(135deg,#7B61FF,#00C2FF);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#b8b8b8;
  line-height:1.8;
  font-size:18px;
  max-width:700px;
  margin:auto;
}

.hero-buttons{
  display:flex;
  gap:16px;
  justify-content:center;
  margin-top:36px;
  flex-wrap:wrap;
}

.primary-btn,
.secondary-btn,
.generate-btn{
  padding:16px 24px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
  font-weight:600;
}

.primary-btn,
.generate-btn{
  background:linear-gradient(135deg,#7B61FF,#00C2FF);
  color:white;
}

.secondary-btn{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

.primary-btn:hover,
.secondary-btn:hover,
.generate-btn:hover{
  transform:translateY(-4px);
}

/* GENERATOR */

.generator-section{
  padding:20px 7% 100px;
}

.generator-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:28px;
  padding:36px;
}

.generator-header{
  margin-bottom:32px;
}

.generator-header h2{
  font-size:36px;
  margin-bottom:10px;
}

.generator-header p{
  color:#b5b5b5;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.input-group label{
  color:#d6d6d6;
  font-size:14px;
}

.input-group input,
.input-group select{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:16px;
  color:white;
  outline:none;
}

.input-group input::placeholder{
  color:#8d8d8d;
}

.generate-btn{
  width:100%;
  margin-top:30px;
}

.output-box{
  margin-top:30px;
}

.output-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.output-top h3{
  font-size:20px;
}

#copyBtn{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:#1A1F2D;
  color:white;
  cursor:pointer;
}

textarea{
  width:100%;
  min-height:320px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:20px;
  color:white;
  resize:none;
  line-height:1.7;
}

/* MOBILE */

@media(max-width:768px){

  .hero h1{
    font-size:42px;
  }

  .generator-card{
    padding:22px;
  }

  .hero-buttons{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<!-- NAVBAR -->

<header class="navbar">
  <div class="logo">Nexora AI</div>

  <button class="nav-btn">
    AI Generator
  </button>
</header>

<!-- HERO -->

<section class="hero">

  <div class="hero-content">

    <div class="badge">
      AI FOR PROPERTY MARKETING
    </div>

    <h1>
      Generate Property Content
      <span class="gradient">in Seconds.</span>
    </h1>

    <p>
      Buat caption Instagram, hook TikTok,
      Meta Ads, dan follow up WhatsApp
      otomatis dengan Nexora AI.
    </p>

    <div class="hero-buttons">
      <button class="primary-btn">
        Start Generating
      </button>

      <button class="secondary-btn">
        Live Demo
      </button>
    </div>

  </div>

</section>

<!-- GENERATOR -->

<section class="generator-section">

  <div class="generator-card">

    <div class="generator-header">
      <h2>✨ Nexora AI Generator</h2>
      <p>
        Create high-converting property content instantly.
      </p>
    </div>

    <div class="form-grid">

      <div class="input-group">
        <label>Lokasi</label>
        <input id="location" type="text" placeholder="BSD / Serpong">
      </div>

      <div class="input-group">
        <label>Tipe Rumah</label>
        <input id="type" type="text" placeholder="2 Kamar Tidur">
      </div>

      <div class="input-group">
        <label>Harga</label>
        <input id="price" type="text" placeholder="300 Jutaan">
      </div>

      <div class="input-group">
        <label>Promo</label>
        <input id="promo" type="text" placeholder="Free Furnished Tanpa DP">
      </div>

      <div class="input-group">
        <label>Target Market</label>
        <input id="market" type="text" placeholder="Karyawan & Pasangan Muda">
      </div>

      <div class="input-group">
        <label>Tone Style</label>

        <select id="tone">
          <option>Hard Selling</option>
          <option>Luxury</option>
          <option>Friendly</option>
          <option>Urgent</option>
        </select>

      </div>

    </div>

    <button id="generateBtn" class="generate-btn">
      ✨ Generate Content
    </button>

    <div class="output-box">

      <div class="output-top">
        <h3>Generated Content</h3>

        <button id="copyBtn">
          Copy
        </button>
      </div>

      <textarea id="output" readonly placeholder="Your AI content will appear here..."></textarea>

    </div>

  </div>

</section>

<script>

/* =========================================
   NEXORA SMART AI ENGINE
========================================= */

const generateBtn = document.getElementById('generateBtn');
const output = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');

/* =========================================
   DATABASE
========================================= */

const hooks = [
  "Rumah dekat {location} cuma {price}?! 😱",
  "Belum banyak yang tahu ada hunian strategis di {location}",
  "Harga segini di {location} masih dapat rumah modern?",
  "Karyawan muda wajib tahu promo rumah ini 👀",
  "Baru launching! Rumah impian mulai {price}",
  "Bisa punya rumah tanpa ribet di {location}",
  "Promo terbatas untuk unit terbaik minggu ini 🔥"
];

const ctas = [
  "Segera jadwalkan survey sebelum kehabisan!",
  "Klik sekarang dan konsultasi gratis 👇",
  "Unit terbatas, jangan sampai terlambat.",
  "Survey weekend ini yuk 😊",
  "Booking sekarang sebelum harga naik.",
  "Kesempatan langka untuk punya rumah strategis."
];

const emotions = [
  "nyaman",
  "modern",
  "strategis",
  "premium",
  "minimalis",
  "elegan"
];

const emojis = ["🔥","✨","😱","🏡","🚀","💯"];

/* =========================================
   HELPER
========================================= */

function random(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function replaceTemplate(text, data){

  return text
    .replaceAll('{location}', data.location)
    .replaceAll('{price}', data.price)
    .replaceAll('{promo}', data.promo)
    .replaceAll('{type}', data.type);

}

function loadingSteps(){

  return new Promise(resolve => {

    const steps = [
      "🔍 Analyzing property market...",
      "🧠 Creating viral hooks...",
      "✨ Generating emotional CTA...",
      "🚀 Optimizing conversion copy..."
    ];

    let index = 0;

    const interval = setInterval(() => {

      output.value = steps[index];

      index++;

      if(index >= steps.length){

        clearInterval(interval);

        setTimeout(() => {
          resolve();
        }, 700);

      }

    }, 900);

  });

}

/* =========================================
   GENERATOR
========================================= */

generateBtn.addEventListener('click', async () => {

  const data = {

    location:
      document.getElementById('location').value || 'BSD',

    type:
      document.getElementById('type').value || '2 Kamar Tidur',

    price:
      document.getElementById('price').value || '300 Jutaan',

    promo:
      document.getElementById('promo').value || 'Free Furnished',

    market:
      document.getElementById('market').value || 'Karyawan Muda',

    tone:
      document.getElementById('tone').value

  };

  generateBtn.disabled = true;

  generateBtn.innerHTML =
    '✨ Nexora AI is thinking...';

  await loadingSteps();

  /* RANDOMIZED CONTENT */

  const hook1 =
    replaceTemplate(random(hooks), data);

  const hook2 =
    replaceTemplate(random(hooks), data);

  const cta =
    random(ctas);

  const emotion =
    random(emotions);

  const emoji =
    random(emojis);

  /* INSTAGRAM */

  const instagram = `
${emoji} Hunian ${emotion} di ${data.location} dengan ${data.type} mulai ${data.price}.

Nikmati promo ${data.promo} dan rasakan tinggal di lokasi strategis dengan akses mudah ke mana saja.

Cocok untuk ${data.market} yang ingin punya rumah nyaman dengan cicilan ringan.

${cta}
`;

  /* TIKTOK */

  const tiktok = `
${hook1}

${hook2}

${cta}
`;

  /* META ADS */

  const metaAds = `
Cari rumah ${emotion} dekat ${data.location}?

Kini hadir hunian ${data.type} mulai ${data.price} dengan promo ${data.promo}.

Cocok untuk ${data.market}.

${cta}
`;

  /* WHATSAPP */

  const whatsapp = `
Halo kak 👋

Untuk unit di ${data.location} masih tersedia dan saat ini ada promo ${data.promo}.

Rumah ${data.type} mulai ${data.price} dan cocok untuk ${data.market}.

Kalau berkenan, minggu ini bisa jadwalkan survey lokasi 😊
`;

  /* OUTPUT */

  output.value =
`📱 INSTAGRAM

${instagram}

━━━━━━━━━━━━━━━━━━

🎬 TIKTOK

${tiktok}

━━━━━━━━━━━━━━━━━━

📢 META ADS

${metaAds}

━━━━━━━━━━━━━━━━━━

💬 WHATSAPP

${whatsapp}`;

  generateBtn.disabled = false;

  generateBtn.innerHTML =
    '✨ Generate Content';

});

/* =========================================
   COPY BUTTON
========================================= */

copyBtn.addEventListener('click', () => {

  output.select();

  document.execCommand('copy');

  copyBtn.innerHTML = '✅ Copied';

  setTimeout(() => {

    copyBtn.innerHTML = 'Copy';

  }, 2000);

});

</script>

</body>
</html>
